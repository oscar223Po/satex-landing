<div data-fls-dynamic=".header__menu-ts, 767" class="header__menu menu">
	<nav class="menu__body">
		<ul class="menu__list">
			<each loop='item in [
					{"href": "#","ancor": "How it works"},
					{"href": "#","ancor": "IV Drips"},
					{"href": "#","ancor": "Reviews"}
				]'>
				<if condition="'[[active]]' === '[[item.ancor]]'">
					<li class="menu__item">
						<a href="[[item.href]]" class="menu__link menu__link--active">[[item.ancor]]</a>
					</li>
				</if>
				<else>
					<li class="menu__item">
						<a href="[[item.href]]" class="menu__link">[[item.ancor]]</a>
					</li>
				</else>
			</each>
		</ul>
		<div class="menu__button-ts"></div>
	</nav>
</div>
